<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Study Desk</title>
<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
font-family:sans-serif;
}
button{
font-size:28px;
padding:30px 60px;
border:none;
border-radius:12px;
}
</style>
</head>
<body>

<button id="deskBtn">上桌</button>

<script>
let startTime = localStorage.getItem("startTime");
let btn = document.getElementById("deskBtn");

if(startTime){
btn.innerText = "下桌";
}

btn.onclick = function(){

if(!startTime){
startTime = new Date().toISOString();
localStorage.setItem("startTime", startTime);
btn.innerText = "下桌";
}else{

let endTime = new Date().toISOString();

fetch("在这里粘贴你的飞书Webhook地址",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
msg_type:"text",
content:{
text:`学习记录
开始:${startTime}
结束:${endTime}`
}
})
});

localStorage.removeItem("startTime");
startTime=null;
btn.innerText="上桌";

alert("已下桌，记得上传错题！");
window.location.href="https://你的飞书表单链接";

}
}
</script>

</body>
</html>
